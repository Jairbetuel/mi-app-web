<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Catálogo - GameStore</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://unpkg.com/vue@3"></script>

<style>

body{
background:#0b0b0b;
color:white;
font-family:Segoe UI;
}

.titulo{
text-align:center;
margin-top:40px;
margin-bottom:30px;
}

.card{
background:#141414;
border:none;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 20px cyan;
}

.card img{
height:200px;
object-fit:cover;
}

.precio{
color:#00ffff;
font-weight:bold;
font-size:18px;
}

.rating{
color:gold;
}

.form-box{
background:#141414;
padding:20px;
border-radius:10px;
margin-bottom:30px;
}

</style>

</head>

<body>

<div id="app">

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-black">
<div class="container">

<a class="navbar-brand">🎮 GameStore</a>

<div>
<a href="./Home.html" class="btn btn-outline-light me-2">Inicio</a>

<a href="./Carrito.html" class="btn btn-warning">
🛒 Carrito ({{ carrito.length }})
</a>
</div>

</div>
</nav>

<div class="container">

<h2 class="titulo">🎮 Catálogo de Videojuegos</h2>

<!-- FORM AGREGAR JUEGO -->
<div class="form-box">

<h4>➕ Agregar nuevo juego</h4>

<input v-model="nuevo.nombre" class="form-control mb-2" placeholder="Nombre">
<input v-model="nuevo.precio" type="number" class="form-control mb-2" placeholder="Precio">
<input v-model="nuevo.img" class="form-control mb-2" placeholder="URL Imagen">
<input v-model="nuevo.rating" class="form-control mb-2" placeholder="Rating (★★★★★)">

<button class="btn btn-success" @click="agregarJuego">
Agregar juego
</button>

</div>

<div class="row g-4">

<div class="col-md-4" v-for="(juego, index) in juegos" :key="juego.nombre">

<div class="card">

<img :src="juego.img">

<div class="card-body text-center">

<h5>{{ juego.nombre }}</h5>

<p class="rating">{{ juego.rating }}</p>

<p class="precio">${{ juego.precio }}</p>

<button class="btn btn-info mb-2" @click="agregarCarrito(juego)">
Agregar al carrito
</button>

<br>

<button class="btn btn-danger btn-sm" @click="eliminarJuego(index)">
Eliminar ❌
</button>

</div>

</div>

</div>

</div>

</div>

</div>

<script>

Vue.createApp({

data(){
return{

carrito: JSON.parse(localStorage.getItem("carrito")) || [],

juegos: JSON.parse(localStorage.getItem("juegos")) || [

{nombre:"Elden Ring",precio:39.99,rating:"★★★★★",img:"https://cdn.cloudflare.steamstatic.com/steam/apps/1245620/header.jpg"},
{nombre:"Resident Evil 4",precio:45,rating:"★★★★★",img:"https://cdn.cloudflare.steamstatic.com/steam/apps/2050650/header.jpg"},
{nombre:"Star Wars Jedi Survivor",precio:59.99,rating:"★★★★☆",img:"https://cdn.cloudflare.steamstatic.com/steam/apps/1774580/header.jpg"}

],

nuevo:{
nombre:"",
precio:"",
img:"",
rating:"★★★★★"
}

}
},

methods:{

agregarCarrito(juego){
this.carrito.push(juego)
localStorage.setItem("carrito", JSON.stringify(this.carrito))
alert("Juego agregado al carrito 🎮")
},

eliminarJuego(index){
this.juegos.splice(index,1)
localStorage.setItem("juegos", JSON.stringify(this.juegos))
},

agregarJuego(){

if(!this.nuevo.nombre || !this.nuevo.precio || !this.nuevo.img){
alert("Completa todos los campos")
return
}

this.juegos.push({...this.nuevo})

localStorage.setItem("juegos", JSON.stringify(this.juegos))

this.nuevo = {
nombre:"",
precio:"",
img:"",
rating:"★★★★★"
}

}

}

}).mount("#app")

</script>

</body>
</html>
