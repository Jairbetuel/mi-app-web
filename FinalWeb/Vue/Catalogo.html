<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Catálogo - GameStore</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://unpkg.com/vue@3"></script>

<style>

body{
background:#0b0b0b;
color:white;
font-family:Segoe UI;
}

.titulo{
text-align:center;
margin-top:40px;
margin-bottom:30px;
}

.card{
background:#141414;
border:none;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 20px cyan;
}

.card img{
height:200px;
object-fit:cover;
}

.precio{
color:#00ffff;
font-weight:bold;
font-size:18px;
}

.rating{
color:gold;
}

</style>

</head>

<body>

<div id="app">

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark bg-black">

<div class="container">

<a class="navbar-brand">🎮 GameStore</a>

<div>

<a href="home.html" class="btn btn-outline-light me-2">Inicio</a>

<a href="carrito.html" class="btn btn-warning">
🛒 Carrito ({{ carrito.length }})
</a>

</div>

</div>

</nav>

<div class="container">

<h2 class="titulo">🎮 Catálogo de Videojuegos</h2>

<div class="row g-4">

<div class="col-md-4"
v-for="juego in juegos"
:key="juego.nombre">

<div class="card">

<img :src="juego.img">

<div class="card-body text-center">

<h5>{{ juego.nombre }}</h5>

<p class="rating">{{ juego.rating }}</p>

<p class="precio">${{ juego.precio }}</p>

<button class="btn btn-info"
@click="agregarCarrito(juego)">
Agregar al carrito
</button>

</div>

</div>

</div>

</div>

</div>

</div>

<script>

Vue.createApp({

data(){
return{

carrito: JSON.parse(localStorage.getItem("carrito")) || [],

juegos:[

{
nombre:"Elden Ring",
precio:39.99,
rating:"★★★★★",
img:"https://cdn.cloudflare.steamstatic.com/steam/apps/1245620/header.jpg"
},

{
nombre:"Resident Evil 4",
precio:45,
rating:"★★★★★",
img:"https://cdn.cloudflare.steamstatic.com/steam/apps/2050650/header.jpg"
},

{
nombre:"Star Wars Jedi Survivor",
precio:59.99,
rating:"★★★★☆",
img:"https://cdn.cloudflare.steamstatic.com/steam/apps/1774580/header.jpg"
},

{
nombre:"Cyberpunk 2077",
precio:35,
rating:"★★★★☆",
img:"img/cyberpunk.jpg"
},

{
nombre:"Spider-Man",
precio:49,
rating:"★★★★★",
img:"img/spiderman.jpg"
},

{
nombre:"Red Dead Redemption 2",
precio:39,
rating:"★★★★★",
img:"img/rdr2.jpg"
},

{
nombre:"Counter Strike 2",
precio:20,
rating:"★★★★☆",
img:"img/cs2.jpg"
},

{
nombre:"GTA V",
precio:29,
rating:"★★★★★",
img:"img/gta.jpg"
},

{
nombre:"Baldurs Gate 3",
precio:59,
rating:"★★★★★",
img:"img/baldur.jpg"
}

]

}
},

methods:{

agregarCarrito(juego){

this.carrito.push(juego)

localStorage.setItem("carrito", JSON.stringify(this.carrito))

alert("Juego agregado al carrito 🎮")

}

}

}).mount("#app")

</script>

</body>
</html>
