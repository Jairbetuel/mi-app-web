<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Soporte - GameStore</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://unpkg.com/vue@3"></script>

<style>

body{
background:#0b0b0b;
color:white;
font-family:Segoe UI;
}

.soporte-box{
max-width:500px;
margin:auto;
margin-top:80px;
background:#141414;
padding:40px;
border-radius:10px;
box-shadow:0 0 20px cyan;
}

.form-control{
background:#111;
border:none;
color:white;
}

.btn-enviar{
background:cyan;
border:none;
font-weight:bold;
}

</style>

</head>

<body>

<div id="app">

<nav class="navbar navbar-dark bg-black">

<div class="container">

<a href="home.html" class="navbar-brand">🎮 GameStore</a>

<a href="catalogo.html" class="btn btn-outline-info">
Catálogo
</a>

</div>

</nav>

<div class="soporte-box">

<h3 class="text-center mb-4">
📩 Soporte GameStore
</h3>

<form @submit.prevent="enviar">

<div class="mb-3">

<label>Nombre</label>

<input
type="text"
class="form-control"
v-model="nombre"
pattern="[A-Za-z ]{3,40}"
required>

</div>

<div class="mb-3">

<label>Correo</label>

<input
type="email"
class="form-control"
v-model="correo"
required>

</div>

<div class="mb-3">

<label>Mensaje</label>

<textarea
class="form-control"
v-model="mensaje"
rows="4"
required
minlength="10">
</textarea>

</div>

<button class="btn btn-enviar w-100">
Enviar mensaje
</button>

<p class="text-center mt-3">{{ estado }}</p>

</form>

</div>

</div>

<script>

Vue.createApp({

data(){
return{
nombre:"",
correo:"",
mensaje:"",
estado:""
}
},

methods:{

enviar(){

if(this.nombre === "" || this.correo === "" || this.mensaje === ""){
this.estado = "Completa todos los campos"
return
}

let telefono="5219516513410"

let texto=`Hola GameStore, soy ${this.nombre}.
Correo: ${this.correo}
Mensaje: ${this.mensaje}

En breve nos pondremos en contacto contigo.`

let url=`https://wa.me/${telefono}?text=${encodeURIComponent(texto)}`

this.estado="Redirigiendo a WhatsApp..."

window.open(url,"_blank")

}

}

}).mount("#app")

</script>

</body>
</html>
