<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Soporte - GameStore</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://unpkg.com/vue@3"></script>

<style>

body{
background:#0b0b0b;
color:white;
font-family:Segoe UI;
}

.soporte-box{
max-width:550px;
margin:auto;
margin-top:80px;
background:#141414;
padding:40px;
border-radius:15px;
box-shadow:0 0 20px cyan;
}

.form-control{
background:#111;
border:none;
color:white;
}

.form-control:focus{
box-shadow:0 0 10px cyan;
}

.btn-enviar{
background:cyan;
border:none;
font-weight:bold;
transition:0.3s;
}

.btn-enviar:hover{
background:#00bcd4;
transform:scale(1.05);
}

.estado-ok{
color:#00ff88;
font-weight:bold;
}

.estado-error{
color:#ff4d4d;
font-weight:bold;
}

</style>

</head>

<body>

<div id="app">

<nav class="navbar navbar-dark bg-black">

<div class="container">

<a href="./Home.html" class="navbar-brand">🎮 GameStore</a>

<div>
<a href="./Catalogo.html" class="btn btn-outline-info me-2">Catálogo</a>
<a href="./Carrito.html" class="btn btn-outline-warning">Carrito</a>
</div>

</div>

</nav>

<div class="soporte-box">

<h3 class="text-center mb-4">
📩 Soporte GameStore
</h3>

<p class="text-center text-secondary mb-4">
¿Tienes problemas con tu compra o cuenta? Contáctanos.
</p>

<form @submit.prevent="enviar">

<div class="mb-3">
<label>Nombre</label>
<input type="text" class="form-control"
v-model="nombre"
placeholder="Tu nombre completo"
required>
</div>

<div class="mb-3">
<label>Correo</label>
<input type="email" class="form-control"
v-model="correo"
placeholder="correo@email.com"
required>
</div>

<div class="mb-3">
<label>Mensaje</label>
<textarea class="form-control"
v-model="mensaje"
rows="4"
placeholder="Describe tu problema..."
required>
</textarea>
</div>

<button class="btn btn-enviar w-100">
Enviar mensaje 📨
</button>

<p class="text-center mt-3"
:class="estadoTipo">
{{ estado }}
</p>

</form>

</div>

</div>

<script>

Vue.createApp({

data(){
return{
nombre:"",
correo:"",
mensaje:"",
estado:"",
estadoTipo:""
}
},

methods:{

enviar(){

if(this.nombre.length < 3){
this.estado="Nombre muy corto"
this.estadoTipo="estado-error"
return
}

if(!this.correo.includes("@")){
this.estado="Correo inválido"
this.estadoTipo="estado-error"
return
}

if(this.mensaje.length < 10){
this.estado="Mensaje muy corto"
this.estadoTipo="estado-error"
return
}

let telefono="5219516513410"

let texto=`🎮 GameStore Soporte

👤 Nombre: ${this.nombre}
📧 Correo: ${this.correo}

📝 Mensaje:
${this.mensaje}

Gracias por contactar con GameStore.`

this.estado="Abriendo WhatsApp..."
this.estadoTipo="estado-ok"

let url=`https://wa.me/${telefono}?text=${encodeURIComponent(texto)}`

window.open(url,"_blank")

}

}

}).mount("#app")

</script>

</body>
</html>
