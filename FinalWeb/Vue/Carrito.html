<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Carrito - GameStore</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://unpkg.com/vue@3"></script>

<style>

body{
background:#0b0b0b;
color:white;
font-family:Segoe UI;
}

.card{
background:#141414;
border:none;
margin-bottom:15px;
border-radius:12px;
transition:0.3s;
}

.card:hover{
box-shadow:0 0 15px cyan;
transform:scale(1.02);
}

.total{
font-size:28px;
color:cyan;
font-weight:bold;
}

.btn-cantidad{
width:30px;
height:30px;
padding:0;
}

</style>

</head>

<body>

<div id="app">

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-black">
<div class="container">
<a href="./Home.html" class="navbar-brand">🎮 GameStore</a>
<a href="./Catalogo.html" class="btn btn-outline-info">← Volver</a>
</div>
</nav>

<div class="container mt-5">

<h2 class="text-center mb-4">🛒 Carrito de Compras</h2>

<div v-if="carrito.length===0" class="text-center">
<p class="fs-4">Tu carrito está vacío 😢</p>
</div>

<div v-else>

<div class="card p-3"
v-for="(p,index) in carrito"
:key="index">

<div class="d-flex justify-content-between align-items-center">

<div>
<h5>{{p.nombre}}</h5>
<p>$ {{p.precio}}</p>

<div class="d-flex align-items-center">
<button @click="disminuir(index)" class="btn btn-secondary btn-cantidad">-</button>
<span class="mx-2">{{p.cantidad}}</span>
<button @click="aumentar(index)" class="btn btn-secondary btn-cantidad">+</button>
</div>

</div>

<button @click="eliminar(index)" class="btn btn-danger">Eliminar</button>

</div>

</div>

</div>

<div class="text-center mt-4" v-if="carrito.length>0">

<p class="total">Total: ${{total.toFixed(2)}}</p>

<button class="btn btn-success me-2" @click="abrirPago">
💳 Pagar
</button>

<button class="btn btn-outline-danger" @click="vaciarCarrito">
🧹 Vaciar carrito
</button>

</div>

</div>

<!-- MODAL -->
<div class="modal fade" id="modalPago">
<div class="modal-dialog">
<div class="modal-content bg-dark text-white">

<div class="modal-header">
<h5>💳 Pago</h5>
<button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">

<input v-model="telefono" class="form-control mb-2" placeholder="WhatsApp (521...)">

<input v-model="numeroTarjeta" class="form-control mb-2" placeholder="Número de tarjeta">
<small class="text-danger">{{errorNumero}}</small>

<input v-model="nombreTarjeta" class="form-control mb-2" placeholder="Nombre del titular">
<small class="text-danger">{{errorNombre}}</small>

<input v-model="fecha" class="form-control mb-2" placeholder="MM/AA">
<small class="text-danger">{{errorFecha}}</small>

<input v-model="cvv" class="form-control mb-2" placeholder="CVV">
<small class="text-danger">{{errorCVV}}</small>

</div>

<div class="modal-footer">
<button class="btn btn-success" @click="pagar">Confirmar</button>
</div>

</div>
</div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

Vue.createApp({

data(){
return{

carrito: JSON.parse(localStorage.getItem("carrito")) || [],

telefono:"",
numeroTarjeta:"",
nombreTarjeta:"",
fecha:"",
cvv:"",

errorNumero:"",
errorNombre:"",
errorFecha:"",
errorCVV:""

}
},

mounted(){
this.carrito.forEach(p=>{
if(!p.cantidad)p.cantidad=1
})
},

computed:{
total(){
return this.carrito.reduce((s,p)=>s+(p.precio*p.cantidad),0)
}
},

methods:{

aumentar(i){
this.carrito[i].cantidad++
this.guardar()
},

disminuir(i){
if(this.carrito[i].cantidad>1){
this.carrito[i].cantidad--
this.guardar()
}
},

eliminar(i){
this.carrito.splice(i,1)
this.guardar()
},

vaciarCarrito(){
this.carrito=[]
localStorage.removeItem("carrito")
},

guardar(){
localStorage.setItem("carrito",JSON.stringify(this.carrito))
},

abrirPago(){
new bootstrap.Modal(document.getElementById("modalPago")).show()
},

pagar(){

this.errorNumero=""
this.errorNombre=""
this.errorFecha=""
this.errorCVV=""

let ok=true

if(this.numeroTarjeta.length<16){
this.errorNumero="Tarjeta inválida"
ok=false
}

if(this.nombreTarjeta.length<3){
this.errorNombre="Nombre inválido"
ok=false
}

if(!this.fecha.includes("/")){
this.errorFecha="Fecha inválida"
ok=false
}

if(this.cvv.length!==3){
this.errorCVV="CVV inválido"
ok=false
}

if(!this.telefono){
alert("Ingresa WhatsApp")
ok=false
}

if(!ok)return

let mensaje="🎮 GameStore - Compra\n\n"

this.carrito.forEach(p=>{
mensaje+=`• ${p.nombre} x${p.cantidad} = $${p.precio*p.cantidad}\n`
})

mensaje+=`\nTotal: $${this.total}`

window.open(`https://wa.me/${this.telefono}?text=${encodeURIComponent(mensaje)}`)

this.carrito=[]
localStorage.removeItem("carrito")

alert("Pago exitoso 💳")

}

}

}).mount("#app")

</script>

</body>
</html>
