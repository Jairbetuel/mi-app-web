<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registro - GameStore</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://unpkg.com/vue@3"></script>

<style>

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;

background-image:url("fondo.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;

font-family:Segoe UI;
}

body::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.75);
}

.registro-box{
position:relative;
background:rgba(20,20,20,0.95);
padding:40px;
border-radius:15px;
width:400px;
box-shadow:0 0 25px cyan;
color:white;
}

h3{
text-align:center;
margin-bottom:20px;
color:cyan;
}

.form-control{
background:#111;
border:none;
color:white;
}

.form-control:focus{
box-shadow:0 0 10px cyan;
}

.btn-registro{
background:cyan;
border:none;
font-weight:bold;
transition:0.3s;
}

.btn-registro:hover{
background:#00bcd4;
transform:scale(1.03);
}

.mensaje-ok{
color:#00ff88;
font-weight:bold;
}

.mensaje-error{
color:#ff4d4d;
font-weight:bold;
}

.link-login{
color:cyan;
text-decoration:none;
}

</style>

</head>

<body>

<div id="app">

<div class="registro-box">

<h3>🎮 Crear Cuenta</h3>

<form @submit.prevent="registrar">

<div class="mb-3">
<label>Nombre</label>
<input type="text"
v-model="nombre"
class="form-control"
placeholder="Tu nombre completo"
required>
</div>

<div class="mb-3">
<label>Correo</label>
<input type="email"
v-model="correo"
class="form-control"
placeholder="correo@email.com"
required>
</div>

<div class="mb-3">
<label>Contraseña</label>
<input type="password"
v-model="password"
class="form-control"
placeholder="Mínimo 6 caracteres"
required>
</div>

<button class="btn btn-registro w-100">
Registrarse 🚀
</button>

<p class="mt-3 text-center" :class="tipoMensaje">
{{ mensaje }}
</p>

</form>

<div class="text-center mt-3">
<a href="./Login.html" class="link-login">← Volver al login</a>
</div>

</div>

</div>

<script>

Vue.createApp({

data(){
return{
nombre:"",
correo:"",
password:"",
mensaje:"",
tipoMensaje:""
}
},

methods:{

registrar(){

let usuarios = JSON.parse(localStorage.getItem("usuarios")) || []

// Validaciones
if(this.nombre.length < 3){
this.mensaje="Nombre muy corto"
this.tipoMensaje="mensaje-error"
return
}

if(!this.correo.includes("@")){
this.mensaje="Correo inválido"
this.tipoMensaje="mensaje-error"
return
}

if(this.password.length < 6){
this.mensaje="Contraseña muy corta"
this.tipoMensaje="mensaje-error"
return
}

// Verificar duplicado
let existe = usuarios.find(user => user.correo === this.correo)

if(existe){
this.mensaje = "Este correo ya está registrado"
this.tipoMensaje = "mensaje-error"
return
}

// Guardar usuario
usuarios.push({
nombre:this.nombre,
correo:this.correo,
password:this.password
})

localStorage.setItem("usuarios", JSON.stringify(usuarios))

this.mensaje = "Cuenta creada correctamente 🎮"
this.tipoMensaje = "mensaje-ok"

// Limpiar campos
this.nombre=""
this.correo=""
this.password=""

// Redirigir
setTimeout(()=>{
window.location.href="./Login.html"
},1500)

}

}

}).mount("#app")

</script>

</body>
</html>
