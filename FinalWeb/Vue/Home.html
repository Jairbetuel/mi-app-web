<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GameStore</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://unpkg.com/vue@3"></script>

<style>

body{
background:#0b0b0b;
color:white;
font-family:Segoe UI;
}

.hero{
height:70vh;
background-image:url("fondo.jpg");
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.hero h1{
font-size:55px;
text-shadow:0 0 20px cyan;
}

.card{
background:#141414;
border:none;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 20px cyan;
}

.navbar-brand{
font-weight:bold;
font-size:22px;
}

</style>

</head>

<body>

<div id="app">

<nav class="navbar navbar-expand-lg navbar-dark bg-black">

<div class="container">

<a class="navbar-brand">🎮 GameStore</a>

<div>

<a href="catalogo.html" class="btn btn-outline-info me-2">Catálogo</a>
<a href="carrito.html" class="btn btn-outline-warning me-2">Carrito</a>
<a href="soporte.html" class="btn btn-outline-light me-3">Soporte</a>

<button @click="logout" class="btn btn-danger">
Cerrar sesión
</button>

</div>

</div>

</nav>

<!-- HERO -->

<section class="hero">

<div>

<h1>Bienvenido {{ usuario }} 🎮</h1>

<p class="lead">
Explora los mejores videojuegos del momento
</p>

<a href="catalogo.html" class="btn btn-info btn-lg mt-3">
Explorar Catálogo
</a>

</div>

</section>

<!-- JUEGOS DESTACADOS -->

<div class="container mt-5">

<h2 class="text-center mb-4">
🔥 Juegos Destacados
</h2>

<div class="row g-4">

<div class="col-md-4" v-for="juego in juegos" :key="juego.nombre">

<div class="card text-center">

<img :src="juego.img" class="card-img-top">

<div class="card-body">

<h5>{{ juego.nombre }}</h5>

<p>${{ juego.precio }}</p>

<a href="catalogo.html" class="btn btn-info">
Ver juego
</a>

</div>

</div>

</div>

</div>

</div>

<footer class="text-center mt-5 p-4 bg-black">
<p>© 2026 GameStore - Tienda de videojuegos</p>
</footer>

</div>

<script>

Vue.createApp({

data(){
return{
usuario:"",
juegos:[
{
nombre:"Elden Ring",
precio:39.99,
img:"https://cdn.cloudflare.steamstatic.com/steam/apps/1245620/header.jpg"
},
{
nombre:"Resident Evil 4",
precio:45,
img:"https://cdn.cloudflare.steamstatic.com/steam/apps/2050650/header.jpg"
},
{
nombre:"Star Wars Jedi Survivor",
precio:59.99,
img:"https://cdn.cloudflare.steamstatic.com/steam/apps/1774580/header.jpg"
}
]
}
},

mounted(){

let sesion = localStorage.getItem("sesion")

if(!sesion){
window.location="login.html"
}

this.usuario = sesion

},

methods:{

logout(){
localStorage.removeItem("sesion")
window.location="home.html"
}

}

}).mount("#app")

</script>

</body>
</html>
