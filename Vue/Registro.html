<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registro GameStore</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Vue -->
<script src="https://unpkg.com/vue@3"></script>

<style>

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;

background-image:url("fondo.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

.registro-box{
background:rgba(0,0,0,0.85);
padding:40px;
border-radius:15px;
width:400px;
box-shadow:0 0 20px cyan;
color:white;
}

.form-control{
background:#111;
border:none;
color:white;
}

</style>

</head>

<body>

<div id="app">

<div class="registro-box">

<h3 class="text-center mb-4">Crear Cuenta</h3>

<form @submit.prevent="registrar">

<div class="mb-3">
<label>Nombre</label>
<input type="text"
v-model="nombre"
class="form-control"
pattern="[A-Za-z ]{3,40}"
required>
</div>

<div class="mb-3">
<label>Correo</label>
<input type="email"
v-model="correo"
class="form-control"
required>
</div>

<div class="mb-3">
<label>Contraseña</label>
<input type="password"
v-model="password"
class="form-control"
minlength="6"
required>
</div>

<button class="btn btn-info w-100">
Registrarse
</button>

<p class="mt-3 text-center" :style="{color: colorMensaje}">
{{ mensaje }}
</p>

</form>

<div class="text-center mt-3">
<a href="index.html">Volver al login</a>
</div>

</div>

</div>

<script>

Vue.createApp({

data(){
return{
nombre:"",
correo:"",
password:"",
mensaje:"",
colorMensaje:"white"
}
},

methods:{

registrar(){

let usuarios = JSON.parse(localStorage.getItem("usuarios")) || []

let existe = usuarios.find(user => user.correo === this.correo)

if(existe){

this.mensaje = "Este correo ya está registrado"
this.colorMensaje = "red"
return

}

usuarios.push({
nombre:this.nombre,
correo:this.correo,
password:this.password
})

localStorage.setItem("usuarios", JSON.stringify(usuarios))

this.mensaje = "Cuenta creada correctamente 🎮"
this.colorMensaje = "lightgreen"

setTimeout(()=>{
window.location="index.html"
},1500)

}

}

}).mount("#app")

</script>

</body>
</html>
