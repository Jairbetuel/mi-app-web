<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Carrito - GameStore</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://unpkg.com/vue@3"></script>

<style>

body{
background:#0b0b0b;
color:white;
font-family:Segoe UI;
}

.card{
background:#141414;
border:none;
margin-bottom:15px;
}

.total{
font-size:22px;
color:cyan;
font-weight:bold;
}

</style>

</head>

<body>

<div id="app">

<!-- NAVBAR -->

<nav class="navbar navbar-dark bg-black">

<div class="container">

<a href="home.html" class="navbar-brand">🎮 GameStore</a>

<a href="catalogo.html" class="btn btn-outline-info">
Volver al catálogo
</a>

</div>

</nav>

<div class="container mt-5">

<h2 class="text-center mb-4">
🛒 Tu carrito de compras
</h2>

<!-- LISTA -->

<div v-if="carrito.length === 0" class="text-center">
<p>Tu carrito está vacío 😢</p>
</div>

<div v-else>

<div class="card p-3"
v-for="(producto,index) in carrito"
:key="index">

<div class="d-flex justify-content-between align-items-center">

<div>
<h5>{{ producto.nombre }}</h5>
<p>${{ producto.precio }}</p>
</div>

<button class="btn btn-danger"
@click="eliminar(index)">
Eliminar
</button>

</div>

</div>

</div>

<!-- TOTAL -->

<div class="text-center mt-4">

<p class="total">
Total: ${{ total }}
</p>

<button @click="vaciarCarrito" class="btn btn-danger me-2">
Vaciar carrito
</button>

<button @click="comprar" class="btn btn-success">
Comprar
</button>

</div>

</div>

</div>


<script>

Vue.createApp({

data(){
return{
carrito: JSON.parse(localStorage.getItem("carrito")) || []
}
},

computed:{

total(){

return this.carrito.reduce((sum, producto)=> sum + producto.precio, 0)

}

},

methods:{

eliminar(index){

this.carrito.splice(index,1)

localStorage.setItem("carrito", JSON.stringify(this.carrito))

},

vaciarCarrito(){

this.carrito = []

localStorage.removeItem("carrito")

},

comprar(){

if(this.carrito.length === 0){
alert("Tu carrito está vacío")
return
}

alert("Compra realizada 🎮")

this.vaciarCarrito()

}

}

}).mount("#app")

</script>

</body>
</html>
