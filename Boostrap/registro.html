<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registro GameStore</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;

background-image:url("fondo.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

.registro-box{
background:rgba(0,0,0,0.85);
padding:40px;
border-radius:15px;
width:400px;
box-shadow:0 0 20px cyan;
color:white;
}

</style>

</head>

<body>

<div class="registro-box">

<h3 class="text-center mb-4">Crear Cuenta</h3>

<form id="registroForm">

<div class="mb-3">

<label>Nombre</label>

<input type="text"
id="nombre"
class="form-control"
pattern="[A-Za-z ]{3,40}"
required>

</div>

<div class="mb-3">

<label>Correo</label>

<input type="email"
id="correo"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Contraseña</label>

<input type="password"
id="password"
class="form-control"
minlength="6"
required>

</div>

<button class="btn btn-info w-100">
Registrarse
</button>

<p id="mensaje" class="mt-3 text-center"></p>

</form>

<div class="text-center mt-3">

<a href="index.html">Volver al login</a>

</div>

</div>

<script>

document.getElementById("registroForm").addEventListener("submit", function(e){

e.preventDefault()

let nombre=document.getElementById("nombre").value
let correo=document.getElementById("correo").value
let password=document.getElementById("password").value

let usuarios=JSON.parse(localStorage.getItem("usuarios")) || []

let existe=usuarios.find(user => user.correo===correo)

if(existe){

document.getElementById("mensaje").innerText="Este correo ya está registrado"
document.getElementById("mensaje").style.color="red"
return

}

usuarios.push({nombre,correo,password})

localStorage.setItem("usuarios", JSON.stringify(usuarios))

document.getElementById("mensaje").innerText="Cuenta creada correctamente"
document.getElementById("mensaje").style.color="lightgreen"

setTimeout(()=>{

window.location="index.html"

},1500)

})

</script>

</body>
</html>
