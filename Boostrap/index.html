<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GameStore Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;

background-image:url("fondo.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;

font-family:Segoe UI;
}

body::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
}

.login-box{
position:relative;
width:380px;
padding:40px;
background:rgba(20,20,20,0.9);
border-radius:15px;
box-shadow:0 0 20px cyan;
color:white;
}

.logo{
text-align:center;
font-size:30px;
color:cyan;
margin-bottom:20px;
}

.form-control{
background:#111;
border:none;
color:white;
}

.btn-gamer{
background:cyan;
border:none;
font-weight:bold;
}

.extra{
text-align:center;
margin-top:15px;
}

.extra a{
color:cyan;
text-decoration:none;
}

</style>

</head>

<body>

<div class="login-box">

<div class="logo">
🎮 GameStore
</div>

<form id="loginForm">

<div class="mb-3">
<label>Correo</label>
<input type="email" id="correo" class="form-control" required>
</div>

<div class="mb-3">
<label>Contraseña</label>
<input type="password" id="password" class="form-control" required>
</div>

<button class="btn btn-gamer w-100">
Iniciar sesión
</button>

<p id="error" class="text-danger mt-2"></p>

</form>

<div class="extra">
¿Nuevo jugador?
<a href="registro.html">Crear cuenta</a>
</div>

</div>

<script>

document.getElementById("loginForm").addEventListener("submit", function(e){

e.preventDefault()

let correo=document.getElementById("correo").value
let password=document.getElementById("password").value

let usuarios=JSON.parse(localStorage.getItem("usuarios")) || []

let usuario=usuarios.find(user =>
user.correo===correo && user.password===password
)

if(usuario){

localStorage.setItem("sesion",usuario.nombre)

window.location="home.html"

}else{

document.getElementById("error").innerText="Correo o contraseña incorrectos"

}

})

</script>

</body>
</html>
