<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Carrito - GameStore</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#0b0b0b;
color:white;
font-family:Segoe UI;
}

.card{
background:#141414;
border:none;
margin-bottom:15px;
}

.total{
font-size:22px;
color:cyan;
font-weight:bold;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-dark bg-black">

<div class="container">

<a href="home.html" class="navbar-brand">🎮 GameStore</a>

<a href="catalogo.html" class="btn btn-outline-info">
Volver al catálogo
</a>

</div>

</nav>


<div class="container mt-5">

<h2 class="text-center mb-4">
🛒 Tu carrito de compras
</h2>

<div id="listaCarrito"></div>

<div class="text-center mt-4">

<p class="total">
Total: $<span id="total">0</span>
</p>

<button onclick="vaciarCarrito()" class="btn btn-danger me-2">
Vaciar carrito
</button>

<button onclick="comprar()" class="btn btn-success">
Comprar
</button>

</div>

</div>


<script>

let carrito = JSON.parse(localStorage.getItem("carrito")) || []

let contenedor = document.getElementById("listaCarrito")

let total = 0

function mostrarCarrito(){

contenedor.innerHTML=""

total=0

carrito.forEach((producto,index)=>{

total += producto.precio

contenedor.innerHTML += `

<div class="card p-3">

<div class="d-flex justify-content-between align-items-center">

<div>
<h5>${producto.nombre}</h5>
<p>$${producto.precio}</p>
</div>

<button class="btn btn-danger"
onclick="eliminar(${index})">
Eliminar
</button>

</div>

</div>

`

})

document.getElementById("total").innerText = total

}

function eliminar(index){

carrito.splice(index,1)

localStorage.setItem("carrito", JSON.stringify(carrito))

mostrarCarrito()

}

function vaciarCarrito(){

localStorage.removeItem("carrito")

carrito=[]

mostrarCarrito()

}

function comprar(){

if(carrito.length===0){

alert("Tu carrito está vacío")

return

}

alert("Compra realizada 🎮")

vaciarCarrito()

}

mostrarCarrito()

</script>

</body>
</html>
